spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ordering_test
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 1
      maximum-pool-size: 10
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/clean
    user: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/ordering_test
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://algashop-authorization-server:8081

algashop:
  integrations:
    shipping.provider: FAKE
    rapidex.url: http://localhost:8780
    product-catalog.url: http://localhost:8781